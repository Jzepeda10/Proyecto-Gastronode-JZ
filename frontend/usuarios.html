<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table class="table">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Nombre</th>
      <th scope="col">Email</th>
      <th scope="col">Rol</th>
      <th scope="col">Telefono</th>
    </tr>
  </thead>
  <tbody id="tabla">
  </tbody>
</table>

 <script>
        fetch('/usuarios')
            .then(res => res.json())
            .then(data => {
                const tabla = document.getElementById('tabla');
                tabla.innerHTML = data.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.nombre}</td>
                        <td>${u.email}</td>
                        <td>${u.rol}</td>
                        <td>${u.telefono}</td>
                    </tr>
                `).join('');
            })
            .catch(err => {
                alert('Error: ' + err.message);
            });
    </script>
</body>
</html>
